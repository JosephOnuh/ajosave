name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_APP_NAME: Ajosave
          NEXTAUTH_URL: ${{ vars.NEXTAUTH_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STELLAR_NETWORK: mainnet
          STELLAR_HORIZON_URL: https://horizon.stellar.org
          STELLAR_NETWORK_PASSPHRASE: "Public Global Stellar Network ; September 2015"
          STELLAR_AJO_CONTRACT_ID: ${{ secrets.STELLAR_AJO_CONTRACT_ID }}
          STELLAR_SERVER_SECRET_KEY: ${{ secrets.STELLAR_SERVER_SECRET_KEY }}
          USDC_ISSUER: ${{ vars.USDC_ISSUER }}
          USDC_ASSET_CODE: USDC
          PAYSTACK_SECRET_KEY: ${{ secrets.PAYSTACK_SECRET_KEY }}
          TERMII_API_KEY: ${{ secrets.TERMII_API_KEY }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      - name: Deploy to Vercel
        id: vercel_deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"

      - name: Health check gate
        id: health_check
        run: |
          APP_URL="${{ vars.NEXT_PUBLIC_APP_URL }}"
          RETRIES=5
          TIMEOUT=30
          for i in $(seq 1 $RETRIES); do
            echo "Health check attempt $i/$RETRIES..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time $TIMEOUT "$APP_URL/api/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Health check failed (HTTP $STATUS), waiting 10s..."
            sleep 10
          done
          echo "Health check failed after $RETRIES attempts"
          exit 1

      - name: Notify Slack on health check failure
        if: failure() && steps.health_check.outcome == 'failure'
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"🚨 *Production deploy health check failed*\nCommit: \`${{ github.sha }}\`\nBranch: \`${{ github.ref_name }}\`\nThe previous version remains active. <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>\"}"
