services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env.local
    environment:
      DATABASE_URL: postgresql://ajosave:ajosave@postgres:5432/ajosave
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ajosave
      POSTGRES_PASSWORD: ajosave
      POSTGRES_DB: ajosave
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ajosave"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # maxmemory: cap at 256 MB (adjust to ~25% of available RAM for your server).
    # maxmemory-policy: allkeys-lru evicts the least-recently-used key when memory is full,
    #   keeping critical paths (OTP, rate-limit, locks) alive as long as they are active.
    # OTP keys are set with EX 300 (5 min), rate-limit keys with EX matching their window.
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
